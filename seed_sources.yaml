# seed_sources.yaml
#
# Curated source list for Embodipedia ingestion.
# Target: ~120 sources across 4 source types covering ~12 entities.
#
# Priority tiers:
#   p0 = must-have for demo (Figure 02, Optimus, π0, G1 deep coverage)
#   p1 = should-have (other major entities)
#   p2 = nice-to-have (depth, contradictions, lesser entities)
#
# Format:
#   source_type: tweet | paper | transcript | news | dev_report
#   subject_entities: [list of primary entities this source is about]
#   actor: who made the claims (for primary sources)
#   priority: p0 | p1 | p2
#   notes: ingestion hints, perspective flavor
#
# NOTE: URLs marked PLACEHOLDER need Sagar to fill in the real one.
# Some are real URLs known from public coverage; others are templates.
# Validate before ingesting — links may have changed.

