# Phase 2 seed sources — papers, transcripts, and news for LLM extraction
# Run: python -m scripts.ingest_sources

papers:
  - title: "π0: A Vision-Language-Action Flow Model for General Robot Control"
    url: "https://physicalintelligence.company/download/pi0.pdf"
    authors: "Kevin Black, Noah Brown, Danny Driess, Adnan Esmail, Michael Equi, et al."
    published_at: "2024-10-31T00:00:00Z"
    abstract: |
      We present π0, a novel flow matching-based robot policy architecture built on top of a
      pre-trained vision-language model. π0 is trained on diverse robot data from multiple robot
      embodiments and can be fine-tuned efficiently for new tasks. The model generates actions via
      a flow matching diffusion process conditioned on language instructions and visual observations.
      We demonstrate that π0 achieves state-of-the-art performance on complex dexterous manipulation
      tasks including laundry folding, table bussing, and box assembly, outperforming prior methods
      including ACT, Diffusion Policy, and OpenVLA. The model can zero-shot transfer to novel tasks
      and generalize across different robot morphologies including bimanual setups.

  - title: "Humanoid Locomotion as Next Token Prediction"
    url: "https://arxiv.org/abs/2402.19469"
    authors: "Ilija Radosavovic, Bike Zhang, Baifeng Shi, Jathushan Rajasegaran, Sasha Sax, et al."
    published_at: "2024-02-29T00:00:00Z"
    abstract: |
      We cast real-world humanoid control as a next-token prediction problem, akin to predicting
      the next word in a language model. Our model, trained on a large dataset of motion capture
      data and robot demonstrations, generates joint positions autoregressively. We demonstrate
      zero-shot transfer from simulated training to a real Unitree H1 robot, achieving robust
      walking, stair climbing, and obstacle avoidance.

  - title: "RT-2: Vision-Language-Action Models Transfer Web Knowledge to Robotic Control"
    url: "https://robotics-transformer2.github.io"
    authors: "Anthony Brohan, Noah Brown, Justice Carbajal, Yevgen Chebotar, et al. (Google DeepMind)"
    published_at: "2023-07-28T00:00:00Z"
    abstract: |
      We study how vision-language models trained on Internet-scale data can be incorporated directly
      into end-to-end robotic control. We propose co-fine-tuning a state-of-the-art VLM on robotic
      trajectory data and natural language responses. The resulting model, RT-2, exhibits remarkable
      generalization: it can interpret novel commands, reason about previously unseen objects, and
      perform multi-step semantic reasoning. RT-2 substantially outperforms RT-1 on a variety of
      generalization metrics across diverse manipulation tasks.

  - title: "Cosmos World Foundation Model Platform for Physical AI"
    url: "https://research.nvidia.com/labs/dir/cosmos"
    authors: "NVIDIA Research"
    published_at: "2025-01-06T00:00:00Z"
    abstract: |
      Cosmos is a pre-trained, physics-aware world foundation model platform. We release diffusion
      and autoregressive models at 4B, 7B, 12B, and 14B parameter scales, trained on 20 million
      hours of curated video. Cosmos models can be conditioned on text, images, or video to produce
      physically plausible future scenes, and are designed for downstream use in robot policy
      training, autonomous driving, and synthetic data generation.

  - title: "Open X-Embodiment: Robotic Learning Datasets and RT-X Models"
    url: "https://robotics-transformer-x.github.io"
    authors: "Open X-Embodiment Collaboration (60+ institutions)"
    published_at: "2023-10-03T00:00:00Z"
    abstract: |
      We present a consolidated dataset of robot trajectories from 22 different robot embodiments
      and 21 institutions, with over 1 million episodes. We train policies on this dataset (RT-X)
      and show that joint training across embodiments improves single-embodiment performance,
      providing evidence that scaling robot learning across heterogeneous datasets is a viable path
      to general-purpose robotic foundation models.

transcripts:
  - title: "Brett Adcock on Figure AI's Commercial Roadmap (CNBC Interview)"
    url: "https://www.cnbc.com/2024/03/13/figure-ai-brett-adcock-interview.html"
    speaker: "Brett Adcock"
    role: "CEO, Figure AI"
    published_at: "2024-03-13T00:00:00Z"
    text: |
      CNBC: You just raised $675 million. What does Figure do with that money?

      Adcock: The first priority is scaling production of Figure 02. We have demand far exceeding
      what we can manufacture right now. We're in active production at our Sunnyvale facility and
      we're going to build a much larger manufacturing operation over the next 18 months.

      CNBC: You have robots at BMW. How is that going?

      Adcock: The BMW deployment is going really well. We have Figure robots operating autonomously
      doing automotive body shop work — lifting, placing parts. This is the first time a humanoid
      robot has done real commercial work in an automotive factory.

      CNBC: What's the path to profitability?

      Adcock: The hardware unit economics get better with scale. At volume, we believe we can sell
      Figure robots at a price that makes sense for commercial customers — think of it like leasing
      a worker. The goal is to have tens of thousands of robots deployed by 2026.

  - title: "Karol Hausman on Physical Intelligence and Robot Foundations (Robot Brains Podcast)"
    url: "https://podcasts.apple.com/us/podcast/robot-brains/id1523584895"
    speaker: "Karol Hausman"
    role: "CEO, Physical Intelligence"
    published_at: "2024-12-10T00:00:00Z"
    text: |
      Host: Why does robotics need its own foundation model company?

      Hausman: The key insight is that language models worked because of scale — huge datasets,
      huge models, hardware that keeps getting cheaper. Robotics hasn't had that moment yet because
      robot data is expensive to collect. Physical Intelligence is betting that if we invest heavily
      in data collection infrastructure and model architecture designed for physical action, we can
      have the same scaling breakthrough for robots that OpenAI had for language.

      Host: Tell us about π0. What makes it different from prior robot learning approaches?

      Hausman: π0 uses flow matching over a pre-trained VLM backbone. The VLM gives you free
      language understanding and visual perception — you don't have to learn that from scratch.
      The flow matching head generates smooth, continuous action trajectories rather than discrete
      tokens, which is much better suited to physical manipulation.

      Host: What's next? π0.5?

      Hausman: We're training on 10x more data right now. The model architecture scales well —
      more data, better performance, fewer task-specific fine-tuning steps needed. I expect we'll
      have something to show partners in Q1 2025.

  - title: "Andrej Karpathy on the Future of Physical AI (No Priors Podcast)"
    url: "https://www.youtube.com/watch?v=karpathy-physical-ai"
    speaker: "Andrej Karpathy"
    role: "Founder, Eureka Labs; former OpenAI and Tesla"
    published_at: "2024-11-20T00:00:00Z"
    text: |
      Host: How do you think physical AI is going to play out over the next decade?

      Karpathy: I think the foundation model approach is going to win in robotics, just like it
      won in language. The recipe is the same: pre-train on huge diverse data, then fine-tune for
      tasks. The hard part is that robot data is much more expensive than text data, and we don't
      yet have an analog to the open web for actions. So the field is going to be bottlenecked by
      data infrastructure for a while.

      Host: Which companies are best positioned?

      Karpathy: The hardware companies — Figure, Tesla, Boston Dynamics — have an advantage in
      that they own the embodiment and the data collection. The pure-software companies —
      Physical Intelligence, Skild — have an advantage in talent density and focus. I'd be
      cautious about anyone claiming AGI-for-robots in the next 2 years; the bottleneck is really
      hard physical reality, and humans have an enormous lead in dexterity and common sense.

      Host: Do you think humanoids are the right form factor?

      Karpathy: For general purpose, yes — the world is built for human form. But for narrow
      tasks, you should probably use a quadruped or a fixed manipulator. I expect humanoids to be
      the platform that wins the long tail and quadrupeds plus manipulators to dominate near-term
      ROI cases like warehouses.

  - title: "Jim Fan on Robot Foundation Models and Synthetic Data (Latent Space Podcast)"
    url: "https://www.latent.space/p/jim-fan-robotics"
    speaker: "Jim Fan"
    role: "Senior Research Manager, NVIDIA GEAR Lab"
    published_at: "2024-10-08T00:00:00Z"
    text: |
      Host: NVIDIA shipped GR00T, Cosmos, and Isaac all in one year. What's the unified vision?

      Fan: The bet is that synthetic data and real data have to be combined. Real robot data is
      scarce. Synthetic data from physics simulators is abundant but has a sim-to-real gap. World
      foundation models like Cosmos give us a third option: generate physically plausible video
      from text, then use that video as supervision for robot policies. If you can blend these
      three sources, you get a path to scaling that's actually feasible.

      Host: How does this compete with what Physical Intelligence and Skild are doing?

      Fan: They're doing real-data-heavy approaches. We're doing real plus simulated plus generated.
      I think both approaches will end up converging — the question is whether you bootstrap from
      simulation, generated video, or real teleoperation data.

      Host: What's the timeline for actually useful humanoids?

      Fan: For controlled commercial environments — warehouses, factories — within 2-3 years.
      For unstructured environments like homes, much longer. The hardest problem isn't perception
      or planning, it's fine motor control plus reliability over millions of repetitions, and
      that's a hardware problem as much as an AI problem.

news:
  - title: "Tesla's Optimus Humanoid Robot Is Now Working in Its Factory"
    url: "https://electrek.co/2025/01/15/tesla-optimus-humanoid-robot-working-in-factory/"
    publication: "Electrek"
    author: "Fred Lambert"
    published_at: "2025-01-15T00:00:00Z"
    text: |
      Tesla confirmed this week that its Optimus humanoid robots are now performing real work
      inside its Fremont, California manufacturing facility. The robots are handling battery cell
      sorting and component manipulation tasks, working alongside human employees with supervision.

      The milestone marks the first time Tesla has used its humanoid robots for production work
      rather than demonstrations. Tesla CEO Elon Musk shared video of the robots on X, calling
      it "a significant milestone toward fully autonomous robot labor."

      Analysts cautioned that the deployment is still in early pilot stages. "One factory line is
      not a revolution," said one analyst. "The question is whether the unit economics work at scale."

  - title: "1X Raises $100M to Put Humanoid Robots in Your Home"
    url: "https://techcrunch.com/2024/01/08/1x-technologies-100m-series-b/"
    publication: "TechCrunch"
    author: "Brian Heater"
    published_at: "2024-01-08T00:00:00Z"
    text: |
      1X Technologies has raised a $100 million Series B funding round led by EQT Ventures, with
      participation from the OpenAI Startup Fund, Sandwater, and existing investors. The Norwegian
      humanoid robotics company plans to use the funding to scale development of Neo, its
      second-generation bipedal robot designed for home environments.

      Unlike most humanoid companies targeting industrial applications, 1X believes the home
      market will be the first major deployment environment for humanoid robots.

  - title: "NVIDIA Unveils Project GR00T at GTC 2024"
    url: "https://nvidianews.nvidia.com/news/nvidia-announces-project-groot"
    publication: "NVIDIA Newsroom"
    author: "NVIDIA Communications"
    published_at: "2024-03-18T00:00:00Z"
    text: |
      NVIDIA founder and CEO Jensen Huang announced Project GR00T, a general-purpose foundation
      model for humanoid robots, at GTC 2024. GR00T-powered robots will be able to understand
      natural language and emulate movement by observing human actions, the company said.

      Initial partners announced include Agility Robotics, Apptronik, Boston Dynamics, Figure AI,
      Fourier Intelligence, Sanctuary AI, Unitree Robotics, and 1X Technologies. NVIDIA also
      announced Jetson Thor, a new computing platform based on the Blackwell architecture, designed
      specifically for humanoid robotics workloads.

      "The next wave of AI is robotics, and physical AI is the biggest opportunity ahead of us,"
      Huang said during the keynote. Industry analysts noted that NVIDIA's positioning mirrors its
      successful strategy with CUDA for general computing and Drive for autonomous vehicles.

  - title: "Amazon Acquires Covariant Talent and Licenses Foundation Models"
    url: "https://techcrunch.com/2024/08/30/amazon-covariant-licensing/"
    publication: "TechCrunch"
    author: "Devin Coldewey"
    published_at: "2024-08-30T00:00:00Z"
    text: |
      Amazon has agreed to license robotic foundation models developed by Covariant and to hire
      the company's three co-founders — Pieter Abbeel, Peter Chen, and Rocky Duan — along with
      about a quarter of Covariant's staff, the companies confirmed Friday.

      The deal, structured as an acqui-hire-plus-license rather than a traditional acquisition,
      follows a similar pattern as Amazon's hiring of Adept's leadership in June. Covariant will
      continue to operate independently and serve its existing customers, though many in the
      industry view its long-term independent prospects as diminished.

      Pieter Abbeel said in a statement: "Joining Amazon allows us to deploy our foundation models
      at a scale that's not feasible for an independent startup."

  - title: "Physical Intelligence Raises $400M for Robotics AI"
    url: "https://techcrunch.com/2024/11/04/physical-intelligence-400-million-robotics/"
    publication: "TechCrunch"
    author: "Kirsten Korosec"
    published_at: "2024-11-04T00:00:00Z"
    text: |
      Physical Intelligence, the robotics AI company behind the π0 foundation model, has raised
      $400 million in Series B funding led by Sequoia Capital, valuing the startup at $2.4 billion.
      The round also includes Jeff Bezos and Lux Capital.

      The company was founded in 2023 by Karol Hausman (CEO), Sergey Levine, Chelsea Finn, and
      Brian Ichter — all prominent researchers in robot learning from Google Brain and academia.
      Physical Intelligence has taken a software-only approach, training general-purpose robot
      policies that can run on different hardware platforms.

      CEO Karol Hausman told TechCrunch: "The π0 model demonstrates that pre-training on diverse
      robot data followed by fine-tuning with minimal demonstrations can match specialized policies
      trained with thousands of examples. The funding will let us scale our data collection
      infrastructure and train much larger models."

      The company has demonstrated π0 performing complex multi-step manipulation including laundry
      folding, table clearing, and box assembly at success rates well above prior state-of-the-art.

  - title: "Skild AI Emerges From Stealth With $300M Raise"
    url: "https://techcrunch.com/2024/05/08/skild-ai-robot-foundation-model/"
    publication: "TechCrunch"
    author: "Brian Heater"
    published_at: "2024-05-08T00:00:00Z"
    text: |
      Skild AI, a robotics foundation model startup founded by Carnegie Mellon professors Deepak
      Pathak and Abhinav Gupta, has raised $300 million in Series A funding — one of the largest
      first institutional rounds in robotics history.

      The company has been developing a generalist robot intelligence model capable of controlling
      diverse robot embodiments without task-specific fine-tuning. Unlike competitors who focus on
      specific robots or tasks, Skild aims to build a single brain that can generalize across
      thousands of robot types.

      Pathak told TechCrunch: "The key insight is that robustness and generalization come from
      diversity in training data across embodiments and environments. We're seeing the same scaling
      laws that worked for language start to emerge in robot learning."

      Investors include Jeff Bezos, SoftBank Vision Fund, Lightspeed, and General Catalyst.
      The company has not yet released public benchmark results but says early customer pilots
      show promising generalization to unseen tasks.

  - title: "Boston Dynamics Retires Hydraulic Atlas, Introduces All-Electric Humanoid"
    url: "https://techcrunch.com/2024/04/17/boston-dynamics-atlas-electric/"
    publication: "TechCrunch"
    author: "Brian Heater"
    published_at: "2024-04-17T00:00:00Z"
    text: |
      Boston Dynamics has announced the retirement of its iconic hydraulic Atlas robot and unveiled
      a new all-electric Atlas, marking a significant pivot toward commercial applications.

      The new Atlas features a 360-degree rotating torso, fully articulated hands, and operates
      entirely on electric motors — eliminating the hydraulic system that made the original Atlas
      powerful but maintenance-intensive. The company says the new design achieves higher torque
      density than the hydraulic predecessor while being simpler to service.

      CEO Robert Playter said: "This is not the dancing robot. This is Atlas going to work."
      The company announced Hyundai as the launch partner for commercial deployments, with a pilot
      program at Hyundai's Georgia manufacturing facility planned for 2025.

      The electric Atlas will be commercialized through direct enterprise agreements rather than
      as a general-purpose product, focusing on manufacturing use cases where Boston Dynamics
      can provide full deployment support.

  - title: "NVIDIA GR00T N1: A Foundation Model for Humanoid Robots"
    url: "https://research.nvidia.com/publication/groot-n1"
    publication: "NVIDIA Research"
    author: "NVIDIA GEAR Lab"
    published_at: "2024-11-13T00:00:00Z"
    text: |
      We present GR00T N1, a 1.5B parameter open foundation model for humanoid robot control.
      GR00T N1 is trained on a mixture of human video demonstrations, synthetic trajectories
      from NVIDIA Isaac Sim, and real robot teleoperation data across multiple robot platforms.

      The model uses a dual-transformer architecture: a vision-language backbone for perception
      and high-level reasoning, and a specialized action backbone for generating control signals.
      GR00T N1 achieves 73% on the LIBERO benchmark and 61% on RLBench, outperforming prior
      open-source baselines.

      GR00T N1 is available for download and fine-tuning via NVIDIA's developer platform.
      Fourteen humanoid robot companies are listed as launch partners using Isaac GR00T for
      their robot AI development pipelines.

  - title: "Figure 03 Unveiled: Figure AI's Commercial-Scale Humanoid"
    url: "https://www.figure.ai/news/figure-03"
    publication: "Figure AI Blog"
    author: "Brett Adcock"
    published_at: "2025-06-01T00:00:00Z"
    text: |
      Today we're launching Figure 03 — our most capable and commercially viable robot yet.
      Figure 03 represents a ground-up redesign of our humanoid platform, optimizing for
      manufacturing scale, reliability, and cost efficiency.

      Key improvements over Figure 02: 8% weight reduction through actuator simplification,
      new hand design with improved grasping force and tactile sensing, Helix 2.0 pre-installed
      with 500,000+ hours of training data from Figure 02 deployments.

      We've been deploying Figure 03 with select customers since Q1 2025. Today we can share
      that we have 500+ units operating across four commercial customers in automotive and logistics.

      The road ahead: we're targeting 5,000 units deployed by end of 2025 and beginning
      external commercial sales in H1 2026. The future of work is being built today.

  - title: "Unitree G1: How China Built the Cheapest Humanoid Robot"
    url: "https://spectrum.ieee.org/unitree-g1-humanoid-robot"
    publication: "IEEE Spectrum"
    author: "Evan Ackerman"
    published_at: "2024-07-01T00:00:00Z"
    text: |
      When Unitree Robotics introduced the G1 humanoid robot at $16,000, it shocked an industry
      accustomed to humanoid platforms costing hundreds of thousands of dollars.

      The G1's low price point stems from Unitree's vertically integrated manufacturing in China,
      reuse of actuator components from its Go2 quadruped lineup, and a willingness to accept
      thin margins to grow market share. At $16,000, the G1 is accessible to university labs,
      corporate R&D teams, and startups that previously couldn't afford humanoid test platforms.

      The tradeoff: G1 has lower payload capacity (25kg vs 55kg for Apptronik Apollo), shorter
      runtime (2 hours vs 4 hours), and fewer DOF in the hands compared to premium competitors.
      Unitree targets developer adoption over enterprise deployment.

      "The G1 is democratizing humanoid robotics research," said one CMU professor who received
      a unit. "We can run 10 G1s for the price of one competitor platform."

  - title: "Gemini Robotics: Google DeepMind Brings Gemini to Physical AI"
    url: "https://deepmind.google/discover/blog/gemini-robotics/"
    publication: "Google DeepMind Blog"
    author: "Google DeepMind"
    published_at: "2025-01-15T00:00:00Z"
    text: |
      We are introducing Gemini Robotics, our new family of AI models designed to bring Gemini's
      reasoning and multimodal capabilities to physical robot control.

      Gemini Robotics is built on Gemini 2.0 and is designed to be inherently multimodal,
      reasoning about spatial relationships, following complex multi-step instructions, and
      adapting to novel objects and environments. The model connects to robot hardware through
      a dedicated action generation head that produces motor commands in real time.

      In our evaluations, Gemini Robotics achieves 74.5% on the RT-2 evaluation suite and
      demonstrates particularly strong performance on long-horizon tasks requiring multi-step
      planning (38 steps average task length in our hardest evaluations).

      We are also releasing Gemini Robotics-ER, an action-free version suitable for spatial
      reasoning, embodied question answering, and robot training data labeling.

      Partnership with Apptronik will bring Gemini Robotics to Apollo humanoid deployments
      in controlled commercial environments starting in H2 2025.

  - title: "The Real State of Humanoid Robots in 2025"
    url: "https://spectrum.ieee.org/humanoid-robots-2025-reality-check"
    publication: "IEEE Spectrum"
    author: "Evan Ackerman"
    published_at: "2025-09-01T00:00:00Z"
    text: |
      Amid the hype cycle around humanoid robots, it's worth grounding expectations in what
      these systems can actually do today.

      The most honest assessment: humanoid robots are performing real commercial work for the
      first time in history. Figure at BMW, Digit at Amazon and GXO, Optimus at Tesla's own
      factory — these are genuine milestones, not demos.

      But the critics have valid points too. In the best-documented deployments, robots operate
      at 3-5x slower cycle times than dedicated industrial automation. They require human
      supervision. They fail unexpectedly in ways that would be unacceptable in a conventional
      factory robot. The economics work only for niche applications where flexibility matters
      more than throughput.

      The most credible near-term bull case: humanoids become profitable in "cognitive labor
      substitution" tasks — jobs requiring physical presence and task-switching but not high
      throughput or micron precision. Think warehouse picking, light assembly, logistics.

      The bear case: by the time humanoids reach cost-competitive autonomy, dedicated
      fixed-function robots (cheaper, faster, more reliable) will have automated most of those
      same jobs anyway.

      The honest answer: we don't know yet. The next 24 months of commercial deployment data
      will be decisive.
